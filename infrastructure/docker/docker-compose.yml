version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: swarmui-master-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: swarmui-master
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - swarmui-master-network

  redis:
    image: redis:7.2-alpine
    container_name: swarmui-master-redis
    restart: unless-stopped
    command: redis-server --requirepass redispassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - swarmui-master-network

volumes:
  mongodb_data:
  redis_data:

networks:
  swarmui-master-network:
    driver: bridge
